<!-- invoiceGenerator.html -->
<template>
    <lightning-card title="Invoice Generator" icon-name="standard:invoice">

        <!-- ═══════════════════  PROGRESS INDICATOR  ═══════════════════ -->
        <div class="slds-var-p-horizontal_medium slds-var-p-top_medium">
            <lightning-progress-indicator
                current-step={currentStep}
                type="base"
                has-error="false"
            >
                <lightning-progress-step label="Select Opportunity" value="1"></lightning-progress-step>
                <lightning-progress-step label="Add Line Items"     value="2"></lightning-progress-step>
                <lightning-progress-step label="Review & Save"      value="3"></lightning-progress-step>
            </lightning-progress-indicator>
        </div>

        <!-- ═══════════════════  ERROR BANNER  ═══════════════════════════ -->
        <template if:true={errorMessage}>
            <div class="slds-var-m_medium">
                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                    <lightning-icon icon-name="utility:error" alternative-text="Error"
                        size="x-small" variant="inverse"
                        class="slds-var-m-right_x-small">
                    </lightning-icon>
                    <span>{errorMessage}</span>
                    <div class="slds-notify__close">
                        <lightning-button-icon
                            icon-name="utility:close"
                            size="small"
                            variant="bare-inverse"
                            onclick={clearError}>
                        </lightning-button-icon>
                    </div>
                </div>
            </div>
        </template>

        <!-- ═══════════════════  STEP 1 – OPPORTUNITY  ════════════════════ -->
        <template if:true={isStep1}>
            <div class="slds-var-p_medium">
                <div class="slds-text-heading_medium slds-var-m-bottom_medium">
                    Step 1: Select Opportunity
                </div>

                <div class="slds-grid slds-wrap slds-gutters">

                    <!-- Opportunity Combobox -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-var-p-bottom_medium">
                        <lightning-combobox
                            label="Opportunity"
                            placeholder="-- Select an Opportunity --"
                            value={selectedOpportunityId}
                            options={opportunityOptions}
                            required
                            onchange={handleOpportunityChange}>
                        </lightning-combobox>
                    </div>

                    <!-- Invoice Date -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-var-p-bottom_medium">
                        <lightning-input
                            type="date"
                            label="Invoice Date"
                            value={invoiceDate}
                            required
                            onchange={handleInvoiceDateChange}>
                        </lightning-input>
                    </div>

                    <!-- Due Date -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-var-p-bottom_medium">
                        <lightning-input
                            type="date"
                            label="Due Date"
                            value={dueDate}
                            required
                            onchange={handleDueDateChange}>
                        </lightning-input>
                    </div>

                    <!-- Status -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-var-p-bottom_medium">
                        <lightning-combobox
                            label="Status"
                            value={invoiceStatus}
                            options={statusOptions}
                            onchange={handleStatusChange}>
                        </lightning-combobox>
                    </div>

                </div>

                <!-- Selected Opp Info Card -->
                <template if:true={selectedOpportunity}>
                    <div class="slds-box slds-theme_shade slds-var-m-top_medium">
                        <div class="slds-text-heading_small slds-var-m-bottom_x-small">
                            Opportunity Details
                        </div>
                        <dl class="slds-dl_horizontal">
                            <dt class="slds-dl_horizontal__label slds-text-color_weak">Account:</dt>
                            <dd class="slds-dl_horizontal__detail">{selectedOpportunity.Account.Name}</dd>
                            <dt class="slds-dl_horizontal__label slds-text-color_weak">Amount:</dt>
                            <dd class="slds-dl_horizontal__detail">{selectedOpportunityAmount}</dd>
                            <dt class="slds-dl_horizontal__label slds-text-color_weak">Close Date:</dt>
                            <dd class="slds-dl_horizontal__detail">{selectedOpportunity.CloseDate}</dd>
                            <dt class="slds-dl_horizontal__label slds-text-color_weak">Stage:</dt>
                            <dd class="slds-dl_horizontal__detail">{selectedOpportunity.StageName}</dd>
                        </dl>
                    </div>
                </template>

            </div>

            <!-- Step 1 Footer -->
            <div class="slds-card__footer slds-text-align_right">
                <lightning-button
                    label="Next: Add Line Items"
                    variant="brand"
                    icon-name="utility:forward"
                    icon-position="right"
                    onclick={goToStep2}
                    disabled={isLoading}>
                </lightning-button>
            </div>
        </template>

        <!-- ═══════════════════  STEP 2 – LINE ITEMS  ═════════════════════ -->
        <template if:true={isStep2}>
            <div class="slds-var-p_medium">
                <div class="slds-grid slds-grid_align-spread slds-var-m-bottom_medium">
                    <div class="slds-text-heading_medium">Step 2: Add Line Items</div>
                    <lightning-button
                        label="Add Line Item"
                        variant="neutral"
                        icon-name="utility:add"
                        onclick={addLineItem}>
                    </lightning-button>
                </div>

                <!-- Line Items Table -->
                <template if:true={hasLineItems}>
                    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_col-bordered">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th class="slds-text-title_caps" scope="col">#</th>
                                <th class="slds-text-title_caps" scope="col">Description *</th>
                                <th class="slds-text-title_caps" scope="col" style="width:100px">Qty *</th>
                                <th class="slds-text-title_caps" scope="col" style="width:130px">Unit Price *</th>
                                <th class="slds-text-title_caps slds-text-align_right" scope="col" style="width:120px">Total</th>
                                <th scope="col" style="width:60px"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={lineItems} for:item="item" for:index="idx">
                                <tr key={item.key} class="slds-hint-parent">
                                    <td>{item.displayIndex}</td>
                                    <td>
                                        <lightning-input
                                            label="Description"
                                            variant="label-hidden"
                                            value={item.description}
                                            placeholder="Product or service description"
                                            data-id={item.key}
                                            data-field="description"
                                            required
                                            onchange={handleLineItemChange}>
                                        </lightning-input>
                                    </td>
                                    <td>
                                        <lightning-input
                                            type="number"
                                            label="Quantity"
                                            variant="label-hidden"
                                            value={item.quantity}
                                            min="0.01"
                                            step="0.01"
                                            data-id={item.key}
                                            data-field="quantity"
                                            required
                                            onchange={handleLineItemChange}>
                                        </lightning-input>
                                    </td>
                                    <td>
                                        <lightning-input
                                            type="number"
                                            label="Unit Price"
                                            variant="label-hidden"
                                            value={item.unitPrice}
                                            formatter="currency"
                                            step="0.01"
                                            min="0"
                                            data-id={item.key}
                                            data-field="unitPrice"
                                            required
                                            onchange={handleLineItemChange}>
                                        </lightning-input>
                                    </td>
                                    <td class="slds-text-align_right">
                                        <div class="slds-var-p-vertical_xx-small slds-var-p-right_x-small">
                                            <lightning-formatted-number
                                                value={item.totalPrice}
                                                format-style="currency"
                                                currency-code="USD">
                                            </lightning-formatted-number>
                                        </div>
                                    </td>
                                    <td>
                                        <lightning-button-icon
                                            icon-name="utility:delete"
                                            variant="bare"
                                            alternative-text="Remove"
                                            title="Remove line item"
                                            data-id={item.key}
                                            onclick={removeLineItem}>
                                        </lightning-button-icon>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>

                    <!-- Totals Row -->
                    <div class="slds-grid slds-grid_align-end slds-var-m-top_medium">
                        <div class="slds-box" style="min-width:260px">
                            <table class="slds-table slds-table_cell-buffer slds-no-row-hover">
                                <tbody>
                                    <tr>
                                        <td class="slds-text-color_weak">Subtotal:</td>
                                        <td class="slds-text-align_right">
                                            <lightning-formatted-number
                                                value={invoiceTotal}
                                                format-style="currency"
                                                currency-code="USD">
                                            </lightning-formatted-number>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td><strong>Total Due:</strong></td>
                                        <td class="slds-text-align_right">
                                            <strong>
                                                <lightning-formatted-number
                                                    value={invoiceTotal}
                                                    format-style="currency"
                                                    currency-code="USD">
                                                </lightning-formatted-number>
                                            </strong>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </template>

                <!-- Empty State -->
                <template if:false={hasLineItems}>
                    <div class="slds-illustration slds-illustration_small slds-var-m-vertical_large">
                        <div class="slds-illustration__figure">
                            <lightning-icon icon-name="utility:list" size="large" class="slds-text-color_weak"></lightning-icon>
                        </div>
                        <div class="slds-illustration__body">
                            <p class="slds-text-body_regular slds-text-color_weak">
                                No line items yet. Click "Add Line Item" to begin.
                            </p>
                        </div>
                    </div>
                </template>

                <!-- Notes -->
                <div class="slds-var-m-top_medium">
                    <lightning-textarea
                        label="Notes / Payment Instructions"
                        value={invoiceNotes}
                        placeholder="Enter any notes, bank details, or payment terms..."
                        max-length="1000"
                        onchange={handleNotesChange}>
                    </lightning-textarea>
                </div>
            </div>

            <!-- Step 2 Footer -->
            <div class="slds-card__footer">
                <lightning-button
                    label="Back"
                    variant="neutral"
                    icon-name="utility:back"
                    onclick={goToStep1}
                    class="slds-var-m-right_small"
                    disabled={isLoading}>
                </lightning-button>
                <lightning-button
                    label="Next: Review"
                    variant="brand"
                    icon-name="utility:forward"
                    icon-position="right"
                    onclick={goToStep3}
                    disabled={isLoading}>
                </lightning-button>
            </div>
        </template>

        <!-- ═══════════════════  STEP 3 – REVIEW & SAVE  ═════════════════ -->
        <template if:true={isStep3}>
            <div class="slds-var-p_medium">
                <div class="slds-text-heading_medium slds-var-m-bottom_medium">
                    Step 3: Review &amp; Save
                </div>

                <!-- Invoice Summary -->
                <div class="slds-box slds-theme_default slds-var-m-bottom_medium">
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <div class="slds-text-title slds-text-color_weak">Opportunity</div>
                            <div class="slds-text-body_regular slds-var-m-bottom_small">{selectedOpportunity.Name}</div>
                            <div class="slds-text-title slds-text-color_weak">Account</div>
                            <div class="slds-text-body_regular slds-var-m-bottom_small">{selectedOpportunity.Account.Name}</div>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                            <div class="slds-text-title slds-text-color_weak">Invoice Date</div>
                            <div class="slds-text-body_regular slds-var-m-bottom_small">{invoiceDate}</div>
                            <div class="slds-text-title slds-text-color_weak">Due Date</div>
                            <div class="slds-text-body_regular slds-var-m-bottom_small">{dueDate}</div>
                            <div class="slds-text-title slds-text-color_weak">Status</div>
                            <div class="slds-text-body_regular">{invoiceStatus}</div>
                        </div>
                    </div>
                </div>

                <!-- Review Table -->
                <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped">
                    <thead>
                        <tr class="slds-line-height_reset">
                            <th scope="col" class="slds-text-title_caps">#</th>
                            <th scope="col" class="slds-text-title_caps">Description</th>
                            <th scope="col" class="slds-text-title_caps slds-text-align_right">Qty</th>
                            <th scope="col" class="slds-text-title_caps slds-text-align_right">Unit Price</th>
                            <th scope="col" class="slds-text-title_caps slds-text-align_right">Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={lineItems} for:item="item">
                            <tr key={item.key}>
                                <td>{item.displayIndex}</td>
                                <td>{item.description}</td>
                                <td class="slds-text-align_right">{item.quantity}</td>
                                <td class="slds-text-align_right">
                                    <lightning-formatted-number
                                        value={item.unitPrice}
                                        format-style="currency"
                                        currency-code="USD">
                                    </lightning-formatted-number>
                                </td>
                                <td class="slds-text-align_right">
                                    <lightning-formatted-number
                                        value={item.totalPrice}
                                        format-style="currency"
                                        currency-code="USD">
                                    </lightning-formatted-number>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="4" class="slds-text-align_right"><strong>Grand Total:</strong></td>
                            <td class="slds-text-align_right">
                                <strong>
                                    <lightning-formatted-number
                                        value={invoiceTotal}
                                        format-style="currency"
                                        currency-code="USD">
                                    </lightning-formatted-number>
                                </strong>
                            </td>
                        </tr>
                    </tfoot>
                </table>

                <template if:true={invoiceNotes}>
                    <div class="slds-var-m-top_medium slds-box slds-theme_shade">
                        <div class="slds-text-title slds-text-color_weak slds-var-m-bottom_xx-small">Notes</div>
                        <p>{invoiceNotes}</p>
                    </div>
                </template>
            </div>

            <!-- Step 3 Footer -->
            <div class="slds-card__footer">
                <lightning-button
                    label="Back"
                    variant="neutral"
                    icon-name="utility:back"
                    onclick={goToStep2}
                    class="slds-var-m-right_small"
                    disabled={isLoading}>
                </lightning-button>
                <lightning-button
                    label="Save &amp; Generate PDF"
                    variant="brand"
                    icon-name="utility:save"
                    onclick={saveAndGeneratePDF}
                    disabled={isLoading}>
                </lightning-button>
            </div>
        </template>

        <!-- ═══════════════════  SUCCESS STATE  ═══════════════════════════ -->
        <template if:true={isSaved}>
            <div class="slds-var-p_large slds-text-align_center">
                <lightning-icon
                    icon-name="action:approval"
                    size="large"
                    class="slds-var-m-bottom_medium"
                    style="--sds-c-icon-color-foreground-default:#2e844a">
                </lightning-icon>
                <div class="slds-text-heading_large slds-var-m-bottom_small" style="color:#2e844a">
                    Invoice Saved Successfully!
                </div>
                <p class="slds-text-body_regular slds-text-color_weak slds-var-m-bottom_medium">
                    Invoice #{savedInvoiceName} has been created and the PDF is ready for download.
                </p>
                <lightning-button
                    label="Download PDF"
                    variant="brand"
                    icon-name="utility:download"
                    class="slds-var-m-right_small"
                    onclick={downloadPDF}>
                </lightning-button>
                <lightning-button
                    label="View Invoice Record"
                    variant="neutral"
                    icon-name="utility:open"
                    icon-position="right"
                    onclick={navigateToInvoice}>
                </lightning-button>
            </div>
        </template>

        <!-- ═══════════════════  SPINNER  ════════════════════════════════ -->
        <template if:true={isLoading}>
            <lightning-spinner
                alternative-text="Processing..."
                size="medium"
                variant="brand">
            </lightning-spinner>
        </template>

    </lightning-card>
</template>
